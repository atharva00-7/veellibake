version: '3.8'

services:
  vellibake-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vellibake-frontend
    ports:
      - "8080:80"
    networks:
      - wolfpack-network
    restart: unless-stopped

networks:
  wolfpack-network:
    name: wolfpack-network
    driver: bridge
